services:
  - type: web
    name: vk-bank-bot
    env: python
    region: frankfurt
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python bot.py"
    envVars:
      - key: PORT
        value: 10000
      - key: VK_TOKEN
        sync: false
      - key: ADMIN_VK_ID
        sync: false
      - key: FIREBASE_CREDENTIALS
        sync: false
